<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Taxes - الرئيسية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #27ae60;
            --primary-hover: #219653;
            --secondary: #2980b9;
            --text-dark: #2c3e50;
            --text-muted: #7f8c8d;
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-top: 60px; color: var(--text-dark); }
        
        /* النافبار (شريط التنقل) */
        .navbar { position: fixed; top: 0; left: 0; width: 100%; height: 70px; background: rgba(255, 255, 255, 0.45); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; padding: 0 8%; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .logo { font-size: 1.6rem; font-weight: 800; color: var(--text-dark); text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .logo i { color: var(--primary); }
        .nav-links a { color: var(--text-dark); text-decoration: none; font-size: 1rem; font-weight: 600; transition: color 0.3s; display: flex; align-items: center; gap: 6px; }
        .nav-links a:hover { color: var(--primary); }

        /* حاوية المحتوى الرئيسي */
        .main-container { text-align: center; width: 90%; max-width: 800px; padding: 20px; }
        .header-title { font-size: 2.2rem; font-weight: 800; margin-bottom: 10px; color: var(--text-dark); text-shadow: 1px 1px 2px rgba(255,255,255,0.8); }
        .header-sub { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 40px; }
        
        /* البطاقات */
        .cards-wrapper { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 25px; }
        .card { background: var(--glass-bg); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); padding: 35px 20px; border-radius: 16px; text-decoration: none; color: var(--text-dark); transition: all 0.4s ease; box-shadow: var(--glass-shadow); position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--primary); opacity: 0; transition: 0.4s; }
        .card.login::before { background: var(--secondary); }
        .card:hover { transform: translateY(-8px); background: rgba(255, 255, 255, 0.85); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12); }
        .card:hover::before { opacity: 1; }
        
        .card-icon { font-size: 3rem; color: var(--primary); margin-bottom: 20px; transition: 0.3s; }
        .card.login .card-icon { color: var(--secondary); }
        .card:hover .card-icon { transform: scale(1.1); }
        .card h3 { font-size: 1.3rem; margin-bottom: 10px; font-weight: 700; }
        .card p { font-size: 0.95rem; color: var(--text-muted); line-height: 1.5; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo"><i class="fas fa-layer-group"></i> MyTaxes</a>
        <div class="nav-links">
            <a href="/login"><i class="fas fa-sign-in-alt"></i> تسجيل الدخول</a>
        </div>
    </nav>

    <div class="main-container">
        <h1 class="header-title">المنصة الرقمية للضرائب</h1>
        <p class="header-sub">بوابتك الموحدة للخدمات الجبائية والدفع الإلكتروني بكل أمان وسهولة.</p>
        
        <div class="cards-wrapper">
            <a href="/register" class="card">
                <i class="fas fa-user-plus card-icon"></i>
                <h3>طلب الولوج للخدمات</h3>
                <p>إنشاء حساب جديد للمكلفين بالضريبة لتسهيل المعاملات الرقمية.</p>
            </a>
            <a href="/login" class="card login">
                <i class="fas fa-laptop-house card-icon"></i>
                <h3>تسجيل الدخول</h3>
                <p>الدخول إلى فضائك الخاص لمتابعة وتسديد الضرائب إلكترونياً.</p>
            </a>
        </div>
    </div>
</body>
</html>
